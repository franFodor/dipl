<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chord Detector - ESP Guitar Tuner</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-4">
        <h2 class="text-center">Chord Detector</h2>
        <div class="row justify-content-center mt-3 mb-4">
            <div class="col-md-4">
                <select id="chord-dropdown" class="form-select form-select-lg bg-dark text-light"></select>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Detected Chord</h4>
                    </div>
                    <div class="card-body">
                        <div id="chord-display" class="chord-display">
                            <div id="chord-name">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="fretboard-container" class="my-4 d-flex justify-content-center">
            <div id="fretboard"></div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script src="chords.js"></script>
    <script src="chord.js"></script>
</body>
