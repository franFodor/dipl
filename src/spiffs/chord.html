<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chord Detector - ESP Guitar Tuner</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-4">
        <h2 class="text-center">Chord Detector</h2>
        
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Detected Chord</h4>
                    </div>
                    <div class="card-body">
                        <div id="chord-display" class="chord-display">
                            <div id="chord-name">--</div>
                            <div id="chord-confidence">Waiting...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script>
        let lastChord = "None";
        let lastConfidence = 0;

        function updateChordDisplay(chord, confidence) {
            const chordNameEl = document.getElementById('chord-name');
            const confidenceEl = document.getElementById('chord-confidence');
            
            if (chord && chord !== "None") {
                chordNameEl.textContent = chord;
                confidenceEl.textContent = `Confidence: ${(confidence * 100).toFixed(0)}%`;
                chordNameEl.classList.add('detected');
            } else {
                chordNameEl.textContent = "--";
                confidenceEl.textContent = "No chord detected";
                chordNameEl.classList.remove('detected');
            }
        }

        function updateStatus(connected) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            if (connected) {
                statusDot.classList.add('connected');
                statusDot.classList.remove('disconnected');
                statusText.textContent = "Live";
            } else {
                statusDot.classList.remove('connected');
                statusDot.classList.add('disconnected');
                statusText.textContent = "Disconnected";
            }
        }

        async function fetchChord() {
            try {
                const response = await fetch('/api/chord');
                const data = await response.json();
                
                if (data.chord !== lastChord || data.confidence !== lastConfidence) {
                    lastChord = data.chord;
                    lastConfidence = data.confidence;
                    updateChordDisplay(data.chord, data.confidence);
                }
                
                updateStatus(true);
            } catch (error) {
                console.error('Error fetching chord:', error);
                updateStatus(false);
            }
        }

        $(document).ready(function() {
            // Load navigation
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    $('#navbar').html(data);
                    $('#nav-chord').addClass('active').append('<span class="sr-only">(current)</span>');
                });

            // Start polling for chord data
            setInterval(fetchChord, 200);
        });
    </script>
</body>
</html>
