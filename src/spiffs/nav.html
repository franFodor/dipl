                    <div style="margin-top:6px">

<script>
if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
window.scrollTo(0, 0);
(function() {
    /* ---- Volume slider ---- */
    var volSlider = document.getElementById('volume-slider');
    var savedVol  = parseFloat(localStorage.getItem('volume') || '1');
    volSlider.value = Math.round(savedVol * 100);
    volSlider.style.setProperty('--vol-pct', Math.round(savedVol * 100) + '%');
    volSlider.addEventListener('input', function() {
        var v = parseInt(this.value) / 100;
        masterVolume = v;
        if (masterGain) masterGain.gain.value = v;
        localStorage.setItem('volume', v.toString());
        this.style.setProperty('--vol-pct', this.value + '%');
    });

    /* ---- Theme ---- */
    var cb   = document.getElementById('theme-checkbox');
    var icon = document.getElementById('theme-icon');
    var isLight = localStorage.getItem('theme') !== 'dark';
    var SVG_SUN  = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
    var SVG_MOON = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    function applyTheme(light) {
        if (light) { document.body.classList.add('light-theme');    cb.checked = true;  icon.innerHTML = SVG_SUN; }
        else        { document.body.classList.remove('light-theme'); cb.checked = false; icon.innerHTML = SVG_MOON; }
    }
    applyTheme(isLight);
    cb.addEventListener('change', function() {
        var light = cb.checked;
        localStorage.setItem('theme', light ? 'light' : 'dark');
        applyTheme(light);
    });

    /* ---- Settings panel open/close ---- */
    document.getElementById('settings-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        var panel = document.getElementById('settings-panel');
        if (panel.style.display === 'none') {
            panel.style.display = 'block';
            wifiStatus();
        } else {
            panel.style.display = 'none';
        }
    });
    document.addEventListener('click', function(e) {
        if (!document.getElementById('settings-widget').contains(e.target)) {
            document.getElementById('settings-panel').style.display = 'none';
        }
    });

    /* ---- WiFi ---- */
    var wifiSelectedSsid = '';
    var wifiSelectedAuth = 1;

    function rssiLabel(rssi) {
        if (rssi >= -50) return '████';
        if (rssi >= -62) return '███░';
        if (rssi >= -74) return '██░░';
        return '█░░░';
    }

    function wifiSetMsg(text, cls) {
        var el = document.getElementById('wifi-msg');
        el.textContent = text;
        el.className = 'wifi-msg' + (cls ? ' ' + cls : '');
    }

    function wifiStatus() {
        fetch('/api/wifi/status')
            .then(function(r) { return r.json(); })
            .then(function(j) {
                var line    = document.getElementById('wifi-status-line');
                var apView  = document.getElementById('wifi-ap-view');
                var staView = document.getElementById('wifi-sta-view');
                if (j.mode === 'ap') {
                    line.innerHTML = 'AP &mdash; <strong>' + j.ssid + '</strong>';
                    apView.style.display  = 'block';
                    staView.style.display = 'none';
                } else if (j.connecting) {
                    line.innerHTML = 'Connecting to <strong>' + j.ssid + '</strong>&hellip;';
                    apView.style.display  = 'none';
                    staView.style.display = 'none';
                } else {
                    line.innerHTML = '<strong>' + j.ssid + '</strong> &bull; ' + j.ip;
                    apView.style.display  = 'none';
                    staView.style.display = 'block';
                }
            })
            .catch(function() {
                document.getElementById('wifi-status-line').textContent = 'Status unavailable';
            });
    }

    function wifiScan() {
        var btn = document.getElementById('wifi-scan-btn');
        btn.textContent = 'Scanning…';
        btn.disabled = true;
        document.getElementById('wifi-net-list').innerHTML = '';
        document.getElementById('wifi-form').style.display = 'none';
        wifiSetMsg('');
        fetch('/api/wifi/scan', { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(nets) {
                var html = '';
                nets.forEach(function(n) {
                    var lock = n.auth ? '🔒 ' : '';
                    html += '<div class="wifi-net-item" data-ssid="' +
                        n.ssid.replace(/&/g,'&amp;').replace(/"/g,'&quot;') +
                        '" data-auth="' + n.auth + '">' +
                        '<span>' + lock + n.ssid + '</span>' +
                        '<span class="wifi-net-rssi">' + rssiLabel(n.rssi) + '</span></div>';
                });
                if (!html) html = '<div style="font-size:0.82rem;color:var(--fg-gray);padding:6px 0">No networks found</div>';
                document.getElementById('wifi-net-list').innerHTML = html;
                btn.textContent = 'Scan Again';
                btn.disabled = false;
            })
            .catch(function() {
                wifiSetMsg('Scan failed', 'err');
                btn.textContent = 'Scan Networks';
                btn.disabled = false;
            });
    }

    function wifiSelect(ssid, auth) {
        wifiSelectedSsid = ssid;
        wifiSelectedAuth = auth;
        document.getElementById('wifi-form-ssid-name').textContent = ssid;
        var passInput = document.getElementById('wifi-pass');
        passInput.value = '';
        document.getElementById('wifi-form').style.display = 'block';
        if (auth === 0) {
            passInput.placeholder = 'Open network – no password needed';
        } else {
            passInput.placeholder = 'Password';
            passInput.focus();
        }
        wifiSetMsg('');
    }

    function wifiConnect() {
        var pass = document.getElementById('wifi-pass').value;
        document.getElementById('wifi-connect-btn').disabled = true;
        wifiSetMsg('Connecting…');
        fetch('/api/wifi/connect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ssid: wifiSelectedSsid, pass: pass })
        })
        .then(function() { showReconnectMsg(wifiSelectedSsid); })
        .catch(function() { showReconnectMsg(wifiSelectedSsid); });
    }

    function showReconnectMsg(ssid) {
        document.getElementById('wifi-form').style.display = 'none';
        document.getElementById('wifi-net-list').innerHTML = '';
        document.getElementById('wifi-scan-btn').style.display = 'none';
        document.getElementById('wifi-status-line').innerHTML =
            'Connecting to <strong>' + ssid + '</strong>…';
        wifiSetMsg('Reconnect to your home WiFi, then visit espplay.local', 'ok');
    }

    function wifiDisconnect() {
        fetch('/api/wifi/disconnect', { method: 'POST' })
            .then(function() {
                document.getElementById('wifi-sta-view').style.display  = 'none';
                document.getElementById('wifi-ap-view').style.display   = 'block';
                document.getElementById('wifi-status-line').innerHTML   = 'AP &mdash; <strong>ESPlay</strong>';
                document.getElementById('wifi-scan-btn').style.display  = '';
                wifiSetMsg('Switched to AP mode: ESPlay', 'ok');
            })
            .catch(function() { wifiSetMsg('Error', 'err'); });
    }

    document.getElementById('wifi-scan-btn').addEventListener('click', wifiScan);
    document.getElementById('wifi-connect-btn').addEventListener('click', wifiConnect);
    document.getElementById('wifi-disc-btn').addEventListener('click', wifiDisconnect);
    document.getElementById('wifi-cancel-btn').addEventListener('click', function() {
        document.getElementById('wifi-form').style.display = 'none';
        wifiSetMsg('');
    });
    document.getElementById('wifi-net-list').addEventListener('click', function(e) {
        var item = e.target.closest('.wifi-net-item');
        if (item) wifiSelect(item.dataset.ssid, parseInt(item.dataset.auth));
    });
    document.getElementById('wifi-pass').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') wifiConnect();
    });
})();
</script>
