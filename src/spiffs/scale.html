<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scale Practice</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-5">
        <h2 class="text-center">Guitar Scales</h2>
        <div class="row justify-content-center mt-4">
            <div class="col-md-8">
                <div class="alert alert-warning" role="alert">
                    <h4 class="alert-heading">TODO</h4>
                </div>
            </div>
        </div>
        
        <div id="fretboard-container" class="mt-4 row justify-content-center">
            <div id="fretboard"></div>
        </div>
    </div>

    
    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>

    <script>
        $(document).ready(function() {
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    $('#navbar').html(data);
                    $('#nav-scale').addClass('active').append('<span class="sr-only">(current)</span>');
                });
        });
    </script>
</body>
</html>
